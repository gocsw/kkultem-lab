<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>직장인 꿀템 연구소 · 구매 링크</title>
<meta name="description" content="영상에서 소개한 꿀템, 번호로 바로 찾으세요. 직장인 꿀템 연구소 검증 상품 목록.">
<meta property="og:title" content="직장인 꿀템 연구소 · 구매 링크">
<meta property="og:description" content="영상에서 들은 번호를 누르세요. 검증한 직장인 꿀템 모음.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#15304B">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍯</text></svg>">
<style>
  :root{
    --navy:#15304B; --navy-2:#1d4166;
    --mint:#0F8F68; --mint-ink:#0a6047; --mint-soft:#e3f4ee;
    --honey:#F5A623; --honey-soft:#fdf3e0; --honey-ink:#8a5a05;
    --bg:#f2f6f7; --card:#ffffff; --ink:#0f2233; --soft:#51636f;
    --faint:#8496a1; --line:#e3eaec; --line-2:#cfdade;
    --r:16px; --r-sm:10px;
    --font:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --navy:#0e2136; --navy-2:#16324e;
      --mint:#34c795; --mint-ink:#7ee0bd; --mint-soft:#10322a;
      --honey:#f5b544; --honey-soft:#33260f; --honey-ink:#f5c877;
      --bg:#0a141d; --card:#111f2c; --ink:#e9eef1; --soft:#a3b3be;
      --faint:#7a8b97; --line:#22374a; --line-2:#2d475d;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);
       line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
  a{color:inherit;text-decoration:none;}

  /* ── 법적 고지 (상단 고정) ── */
  .legal{background:var(--navy);color:#c9d8e6;font-size:11.5px;line-height:1.5;
         padding:8px 14px;text-align:center;letter-spacing:-.02em;}

  .wrap{max-width:640px;margin:0 auto;padding:0 14px 72px;}

  /* ── 헤더 ── */
  header{padding:26px 4px 18px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .beaker{flex:none;width:52px;height:52px;border-radius:14px;
          background:linear-gradient(150deg,var(--navy),var(--mint));
          display:grid;place-items:center;font-size:26px;
          box-shadow:0 6px 18px rgba(15,143,104,.28);}
  .brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.03em;}
  .brand p{margin:2px 0 0;font-size:12.5px;color:var(--faint);}
  .lead{margin:16px 0 0;background:var(--honey-soft);border:1px solid var(--line);
        border-radius:var(--r-sm);padding:11px 14px;font-size:13.5px;color:var(--honey-ink);
        font-weight:600;}
  .sub{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .sub a{font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:99px;
         border:1px solid var(--line-2);color:var(--soft);}
  .sub a.yt{background:#ff0033;border-color:#ff0033;color:#fff;}

  /* ── 검색 · 카테고리 ── */
  .tools{position:sticky;top:0;z-index:5;background:var(--bg);
         padding:10px 0 8px;margin-bottom:4px;}
  .search{width:100%;padding:11px 14px;font-size:14.5px;font-family:inherit;
          border:1px solid var(--line-2);border-radius:99px;background:var(--card);
          color:var(--ink);outline:none;}
  .search:focus{border-color:var(--mint);box-shadow:0 0 0 3px var(--mint-soft);}
  .cats{display:flex;gap:6px;overflow-x:auto;padding:9px 0 2px;
        scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .chip{flex:none;font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:99px;
        border:1px solid var(--line-2);background:var(--card);color:var(--soft);
        cursor:pointer;font-family:inherit;}
  .chip[aria-pressed="true"]{background:var(--mint);border-color:var(--mint);color:#fff;}

  /* ── 상품 카드 ── */
  .list{display:grid;gap:10px;}
  .item{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
        padding:13px;display:flex;gap:13px;align-items:flex-start;
        transition:border-color .15s, transform .15s;}
  .item:hover{border-color:var(--mint);}
  .no{flex:none;width:56px;height:56px;border-radius:12px;background:var(--navy);
      color:#fff;display:grid;place-items:center;font-weight:800;font-size:21px;
      font-variant-numeric:tabular-nums;position:relative;overflow:hidden;}
  .no img{width:100%;height:100%;object-fit:cover;background:#fff;}
  .no .tag{position:absolute;inset:auto 0 0 0;background:var(--honey);color:#3a2600;
           font-size:9px;font-weight:800;text-align:center;letter-spacing:.04em;}
  .no .numbadge{position:absolute;top:0;left:0;background:rgba(15,34,51,.85);color:#fff;
           font-size:11px;font-weight:800;line-height:1;padding:2px 6px;
           border-bottom-right-radius:8px;font-variant-numeric:tabular-nums;}
  .no .nofb{display:none;}
  .no.imgfail img,.no.imgfail .numbadge{display:none;}
  .no.imgfail .nofb{display:grid;place-items:center;width:100%;height:100%;
           font-size:21px;font-weight:800;}
  .body{flex:1;min-width:0;}
  .cat{display:inline-block;font-size:11px;font-weight:800;color:var(--mint-ink);
       background:var(--mint-soft);border-radius:5px;padding:1px 7px;margin-bottom:4px;}
  .name{font-size:15px;font-weight:700;margin:0 0 3px;line-height:1.35;}
  .desc{font-size:12.5px;color:var(--soft);margin:0 0 10px;line-height:1.5;}
  .btns{display:flex;gap:6px;flex-wrap:wrap;}
  .buy{background:var(--honey);color:#3a2600;font-weight:800;font-size:13px;
       padding:8px 15px;border-radius:99px;}
  .buy:active{transform:scale(.97);}
  .rev{border:1px solid var(--line-2);color:var(--soft);font-weight:700;font-size:13px;
       padding:8px 13px;border-radius:99px;}

  .empty{text-align:center;color:var(--faint);font-size:13.5px;padding:40px 0;}
  footer{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);
         font-size:11.5px;color:var(--faint);line-height:1.7;}
  @media (max-width:360px){ .no{width:48px;height:48px;font-size:18px;} }
</style>
</head>
<body>

<div class="legal">이 페이지는 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="beaker">🍯</div>
      <div>
        <h1>직장인 꿀템 연구소</h1>
        <p>직장인의 하루를 편하게 만드는 검증템</p>
      </div>
    </div>
    <p class="lead">📺 영상에서 들은 번호를 찾으세요</p>
    <div class="sub">
      <a class="yt" href="https://www.youtube.com/@office_worker_lab" target="_blank" rel="noopener">▶ 유튜브 구독</a>
      <a href="mailto:gocsw3@gmail.com">비즈니스 문의</a>
    </div>
  </header>

  <div class="tools">
    <input id="q" class="search" type="search" placeholder="상품 이름이나 번호로 검색" aria-label="상품 검색">
    <div class="cats" id="cats"></div>
  </div>

  <div class="list" id="list"></div>
  <div class="empty" id="empty" hidden>찾는 상품이 없어요.<br>검색어를 지우고 다시 찾아보세요.</div>

  <footer>
    직장인 꿀템 연구소 · 소개한 제품은 직접 고른 상품이며, 구매 시 판매액의 일부를 수수료로 제공받습니다.<br>
    가격·재고는 쿠팡에서 실시간으로 바뀌므로 링크에서 확인해 주세요.
  </footer>
</div>

<script src="products.js"></script>
<script>
(function () {
  var items = (window.PRODUCTS || []).slice().sort(function (a, b) { return b.no - a.no; });
  var listEl = document.getElementById('list');
  var emptyEl = document.getElementById('empty');
  var catsEl = document.getElementById('cats');
  var qEl = document.getElementById('q');
  var activeCat = '전체';

  var cats = ['전체'];
  items.forEach(function (p) { if (p.cat && cats.indexOf(p.cat) < 0) cats.push(p.cat); });

  cats.forEach(function (c) {
    var b = document.createElement('button');
    b.className = 'chip';
    b.type = 'button';
    b.textContent = c;
    b.setAttribute('aria-pressed', c === '전체' ? 'true' : 'false');
    b.addEventListener('click', function () {
      activeCat = c;
      [].forEach.call(catsEl.children, function (x) {
        x.setAttribute('aria-pressed', x === b ? 'true' : 'false');
      });
      render();
    });
    catsEl.appendChild(b);
  });

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (m) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
    });
  }

  function card(p) {
    var el = document.createElement('div');
    el.className = 'item';
    var thumb = p.img
      ? '<img src="' + esc(p.img) + '" alt="" loading="lazy" onerror="this.closest(\'.no\').classList.add(\'imgfail\')">' +
        '<span class="numbadge">' + esc(p.no) + '</span><span class="nofb">' + esc(p.no) + '</span>'
      : esc(p.no);
    var hot = p.hot ? '<span class="tag">인기</span>' : '';
    var review = p.video
      ? '<a class="rev" href="' + esc(p.video) + '" target="_blank" rel="noopener">▶ 리뷰 영상</a>'
      : '';
    el.innerHTML =
      '<div class="no">' + thumb + hot + '</div>' +
      '<div class="body">' +
        (p.cat ? '<span class="cat">' + esc(p.cat) + '</span>' : '') +
        '<p class="name">' + esc(p.no) + '. ' + esc(p.name) + '</p>' +
        (p.desc ? '<p class="desc">' + esc(p.desc) + '</p>' : '') +
        '<div class="btns">' +
          '<a class="buy" href="' + esc(p.link) + '" target="_blank" rel="noopener nofollow sponsored">🛒 최저가 확인하기</a>' +
          review +
        '</div>' +
      '</div>';
    return el;
  }

  function render() {
    var q = qEl.value.trim().toLowerCase();
    var shown = items.filter(function (p) {
      if (activeCat !== '전체' && p.cat !== activeCat) return false;
      if (!q) return true;
      return (String(p.no) + ' ' + (p.name || '') + ' ' + (p.desc || '') + ' ' + (p.cat || ''))
        .toLowerCase().indexOf(q) > -1;
    });
    listEl.innerHTML = '';
    shown.forEach(function (p) { listEl.appendChild(card(p)); });
    emptyEl.hidden = shown.length > 0;
  }

  qEl.addEventListener('input', render);
  render();
})();
</script>
</body>
</html>
